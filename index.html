<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>江江乐 · 初始页</title>
    <style>
        /* 基础重置 & 字体 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        }

        body {
            background-color: #f2f4f8;
            display: flex;
            justify-content: center;
            padding: 24px 16px;
            min-height: 100vh;
            align-items: center;
        }

        /* 主容器：卡片式页面 */
        .page {
            max-width: 1000px;
            width: 100%;
            background-color: #ffffff;
            border-radius: 28px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08), 0 6px 12px rgba(0, 0, 0, 0.05);
            overflow: hidden;
            padding: 24px 32px 40px 32px;
        }

        /* 顶部栏 (QQ邮箱 / 日期天气+语言) */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.95rem;
            color: #3c3c4399;
            padding-bottom: 16px;
            border-bottom: 1px solid #e9e9ed;
        }

        .top-left {
            font-weight: 500;
            color: #0066cc;
            cursor: default;
        }

        .top-right {
            display: flex;
            gap: 24px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .weather-tag {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .weather-tag span:first-child {
            font-weight: 600;
            color: #1c1c1e;
        }

        .date {
            color: #3c3c43;
        }

        .lang-switch {
            background-color: #f2f2f7;
            padding: 4px 10px;
            border-radius: 30px;
            font-size: 0.85rem;
            color: #1c1c1e;
            display: flex;
            align-items: center;
            gap: 4px;
            cursor: default;
        }

        .lang-switch .separator {
            color: #c6c6c8;
            font-weight: 300;
        }

        /* 导航栏 (七个栏目) */
        .nav-bar {
            margin: 20px 0 18px 0;
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 32px;
            flex-wrap: wrap;
            font-weight: 500;
            color: #2c2c2e;
            font-size: 1.05rem;
            border-bottom: 1px solid #f0f0f3;
            padding-bottom: 14px;
        }

        .nav-links li {
            cursor: default;
            transition: color 0.2s;
            color: #4b4b55;
        }

        .nav-links li:hover {
            color: #007aff;
        }

        /* 搜索区域 (DeepSeek品牌 + 搜索框) */
        .search-section {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            background-color: #f9f9fc;
            border-radius: 60px;
            padding: 8px 16px 8px 24px;
            margin: 16px 0 32px 0;
            border: 1px solid #e5e5ea;
        }

        .brand-area {
            display: flex;
            align-items: baseline;
            gap: 6px;
            flex-wrap: wrap;
        }

        .brand-main {
            font-weight: 700;
            font-size: 1.4rem;
            letter-spacing: -0.5px;
            color: #1c1c1e;
        }

        .brand-divider {
            color: #aeaeb2;
            font-weight: 300;
            margin: 0 2px;
        }

        .brand-sub {
            font-weight: 400;
            color: #636366;
            font-size: 1.1rem;
        }

        .brand-tagline {
            font-size: 0.9rem;
            color: #8e8e93;
            margin-left: 12px;
            background: #e9e9ef;
            padding: 4px 12px;
            border-radius: 50px;
        }

        .search-box {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .search-box input {
            border: none;
            background: white;
            padding: 12px 18px;
            border-radius: 40px;
            width: 240px;
            font-size: 0.95rem;
            border: 1px solid #d9d9e0;
            outline: none;
            transition: 0.2s;
        }

        .search-box input:focus {
            border-color: #007aff;
            box-shadow: 0 0 0 3px rgba(0,122,255,0.1);
        }

        .search-box button {
            background-color: #007aff;
            border: none;
            color: white;
            font-weight: 500;
            padding: 12px 24px;
            border-radius: 40px;
            cursor: default;
            font-size: 0.95rem;
            border: 1px solid #007aff;
            letter-spacing: 0.3px;
        }

        .search-box button::before {
            content: "Q ";
            font-weight: 400;
            opacity: 0.9;
        }

        /* 中间大标题 —— 江江乐 */
        .jiang-section {
            margin: 20px 0 40px 0;
            background: linear-gradient(145deg, #f2f2fc, #eaeef5);
            border-radius: 60px;
            padding: 48px 20px;
            text-align: center;
            border: 1px solid #ffffff50;
            box-shadow: inset 0 2px 4px rgba(255,255,255,0.8), 0 6px 12px rgba(0,0,0,0.02);
        }

        .jiang-section h1 {
            font-size: 5.5rem;
            font-weight: 800;
            letter-spacing: 4px;
            color: #1f2b3a;
            text-shadow: 2px 2px 0 rgba(255,255,255,0.6);
            line-height: 1.1;
            word-break: keep-all;
        }

        .jiang-section p {
            color: #4a5361;
            font-size: 1.3rem;
            margin-top: 12px;
            font-weight: 300;
        }

        /* 简约底部装饰 (可选，不影响主体) */
        .footer-simple {
            margin-top: 30px;
            text-align: center;
            font-size: 0.9rem;
            color: #a1a1a8;
            border-top: 1px solid #efeff4;
            padding-top: 24px;
        }
    </style>
</head>
<body>
    <div class="page">
        <!-- 顶部栏：QQ邮箱 + 天气/日期/语言 -->
        <div class="top-bar">
            <div class="top-left">📧 QQ邮箱</div>
            <div class="top-right">
                <div class="weather-tag">
                    <span>13℃</span>
                    <span>局部多云 ⛅</span>
                </div>
                <div class="date">2026/3/14</div>
                <div class="lang-switch">
                    <span>简体中文</span>
                    <span class="separator">|</span>
                    <span>中x</span>
                </div>
            </div>
        </div>

        <!-- 导航栏：七个指定栏目 -->
        <div class="nav-bar">
            <ul class="nav-links">
                <li>知识科普</li>
                <li>志愿</li>
                <li>研学</li>
                <li>创意工坊</li>
                <li>文创</li>
                <li>定制服务</li>
                <li>队伍</li>
            </ul>
        </div>

      
        <!-- 中间醒目栏：江江乐 (大号) -->
        <div class="jiang-section">
            <h1>江江乐</h1>
            <p>江水泱泱 · 乐起云涌</p>
        </div>

        <!-- 极简留白装饰，保持页面干净 -->
        <div class="footer-simple">
            ⏺ 2026/3/14  ·  初始页面 · 仅保留核心元素
        </div>
    </div>
</body>
</html>
